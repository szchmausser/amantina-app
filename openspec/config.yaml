# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Laravel 12.58 + React 19.2.4 + Inertia.js v2 + Tailwind CSS 4.2.1 + shadcn/ui
  Architecture: Monolithic Laravel backend with Inertia SPA frontend. No REST API — all data flows through Inertia props. Single-institution (ID=1), not multi-tenant.
  Testing: Pest 4 (Feature + Browser/Playwright). 700 tests passing. Strict TDD mode enabled.
  Style: PHP 8.4+, strict types, Pint formatting. React 19 + TypeScript strict. Tailwind CSS 4 utilities. ESLint 9 + Prettier 3.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Scope is limited to Socioproductiva subject hours tracking — not a general school manager
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - UI strings in Spanish, code identifiers in English
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Prefer Eloquent over raw SQL; Form Requests over inline validation
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Always include test tasks alongside implementation
  apply:
    - Follow existing code patterns (Pint formatting, English code, Spanish UI)
    - Run `php artisan config:clear && php artisan cache:clear` before tests
    tdd: true
    test_command: "php artisan test --compact --filter="
  verify:
    test_command: "php artisan config:clear && php artisan cache:clear && php artisan test --compact --filter="
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
